<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FF6F00">
  <meta name="description" content="Dog training slot planner for Fairy Tails K9 Centre">
  <title>Fairy Tails Training Planner</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="header-top">
      <h1 class="header-title">Fairy Tails K9 — Training Planner</h1>
    </div>
    <nav class="header-nav">
      <button class="nav-btn active" data-view="planner">Planner</button>
      <button class="nav-btn" data-view="summary">Summary</button>
      <button class="nav-btn" data-view="settings">Settings</button>
    </nav>
  </header>

  <main id="app-content"></main>
  <div id="modal-root"></div>

  <!-- CDN: jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js" defer></script>

  <!-- App scripts in dependency order -->
  <script src="js/storage.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/equipment.js"></script>
  <script src="js/slots.js"></script>
  <script src="js/planner.js"></script>
  <script src="js/summary.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
